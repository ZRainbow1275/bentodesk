name: Release

# Single unified release workflow. A push of any `vX.Y.Z` tag produces a
# GitHub Release containing the NSIS installer, its minisign signature,
# and `latest.json` so the Tauri v2 updater can verify and install
# upgrades on end-user machines. New users download the installer,
# existing users get the in-app update — both consume the same release.
#
# Required secrets (configured at repo level):
#   TAURI_SIGNING_PRIVATE_KEY          - base64 minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - passphrase for the private key

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to cut the release against (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package versions
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$EXPECTED conf=$CONF pkg=$PKG cargo=$CARGO"
          if [ "$EXPECTED" != "$CONF" ] || [ "$EXPECTED" != "$PKG" ] || [ "$EXPECTED" != "$CARGO" ]; then
            echo "::error::Version mismatch — tag $TAG expects $EXPECTED but found conf=$CONF pkg=$PKG cargo=$CARGO"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Guardian binary
        run: cargo build --release --bin guardian --manifest-path src-tauri/Cargo.toml

      - name: Build + sign Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "BentoDesk ${{ inputs.tag || github.ref_name }}"
          releaseBody: |
            ## BentoDesk ${{ inputs.tag || github.ref_name }}

            正式发布包，签名 + 自动更新通道合一。

            ### 下载内容

            - `BentoDesk_*_x64-setup.exe` — Windows NSIS 安装包（推荐）
            - `BentoDesk_*_x64-setup.exe.sig` — minisign 签名（updater 校验用）
            - `latest.json` — Tauri Updater 的版本清单

            ### 安装说明

            - **新用户**：下载 `*_x64-setup.exe` 直接安装
            - **老用户**：应用内会自动检测并提示更新（需联网，会校验签名）
            - 详细变更见 `CHANGELOG.md`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

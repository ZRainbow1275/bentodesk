name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Guardian binary
        run: cargo build --release --bin guardian --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BentoDesk ${{ github.ref_name }}"
          releaseBody: |
            ## BentoDesk ${{ github.ref_name }}

            自动构建的 Windows 发布包。

            ### 下载内容

            - `BentoDesk_*_x64-setup.exe`：NSIS 安装包，推荐普通用户使用
            - `BentoDesk_*_x64_en-US.msi`：MSI 安装包，适合需要企业分发的场景

            ### 安装说明

            - 安装前请先退出正在运行的 BentoDesk
            - 如从旧版本手动升级，可直接运行安装包覆盖安装
            - 详细变更请查看 `CHANGELOG.md`
          releaseDraft: false
          prerelease: false

name: Release (signed / updater)

# Use this workflow when cutting a release that should be picked up by
# the Tauri v2 updater plugin. Unlike `release.yml`, this build:
#   1. injects the minisign signing key from GitHub Secrets;
#   2. lets `tauri-action` generate a `.sig` for the NSIS installer and
#      publishes a `latest.json` manifest alongside the binaries;
#   3. the updater plugin on end-user machines reads `latest.json` from
#      the "Latest" release URL and verifies `.sig` against the embedded
#      `pubkey`.
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY          - base64 minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - passphrase for the private key
#
# Trigger by pushing a tag like `v1.2.1-updater` or by running manually
# via workflow_dispatch.

on:
  push:
    tags:
      - "v*-updater"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to cut the signed release against (e.g. v1.2.1)"
        required: true
        type: string

jobs:
  build-and-sign:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Guardian binary
        run: cargo build --release --bin guardian --manifest-path src-tauri/Cargo.toml

      - name: Build + sign Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "BentoDesk ${{ inputs.tag || github.ref_name }}"
          releaseBody: |
            ## BentoDesk ${{ inputs.tag || github.ref_name }}

            签名发布包，用于 GitHub Releases 分发和 Tauri Updater 自动更新。

            ### 下载内容

            - `BentoDesk_*_x64-setup.exe`: Windows NSIS 安装包
            - `*.sig`: 对应安装包的 minisign 签名文件
            - `latest.json`: Updater 使用的版本清单

            ### 升级说明

            - 已安装旧版本的用户，可通过应用内更新或直接下载安装包覆盖安装
            - 安装前请先退出正在运行的 BentoDesk
            - 详细修复和变更请查看 `CHANGELOG.md`

            ### 校验说明

            - 本 workflow 会在构建产物时生成签名与 `latest.json`
            - Tauri Updater 会使用内置公钥校验下载内容完整性
            - 如需人工分发，也可直接使用发布页中的安装包
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
